<!DOCTYPE HTML>

    <head>
        <meta charset="utf-8">
        <title>College Campus Tour</title>

        <style>
            /* 1. Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 2. Main Container */
        .hero {
            height: 100vh;
            width: 100%;
            background-image: url('logo.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background-color: #000;
        }

        /* 3. The 360 Viewer (Hidden behind the blur initially) */
        #campus-map {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 4. The Blur Overlay */
        .blur-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2); 
            backdrop-filter: blur(15px);    
            -webkit-backdrop-filter: blur(15px); 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: all 1s ease-in-out;
        }

        /* 5. Top Left Hover Area */
        .info-container {
            position: absolute;
            top: 30px;
            left: 70px;
            z-index: 30;
            cursor: default;
        }

        .logo{
           position: absolute;
           top: 27px;
           left: 30px;
           width: 30px; 
        }

        .top-left-text {
            color: white;
            font-size: 0.8rem; 
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
            transition: color 0.3s ease;
        }

        .campus-details {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-left: 4px solid #e6f05a;
            margin-top: 15px;
            padding: 0 15px;
            color: white;
            transition: all 0.5s ease;
            width: 300px;
        }

        .info-container:hover .campus-details {
            max-height: 230px;
            opacity: 1;
            padding: 15px;
        }

        .info-container:hover .top-left-text {
            color: #e6f05a;
        }

        .campus-details p {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .campus-details span {
            font-weight: bold;
            color: #e6f05a; 
        }

        /* 6. THE GLASSY BUTTON EFFECT */
        .start-btn {
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            position: relative;
            z-index: 10;
            animation: pulse 2s infinite;
        }

        .start-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
            box-shadow: 0 8px 32px 0 rgba(230, 240, 90, 0.3);
            letter-spacing: 4px;
        }


            body { margin: 0; padding: 0; }
            #campus-map { width: 100vw; height: 100vh; }
            .time-btn {
                position: absolute;
                top: 20px;
                right: 20px;
                z-index: 10; /* Forces the button to sit on top of the 360 viewer */
                padding: 6px 5px;
                background-color: #1a1a1a;
                color: #ffffff;
                border: 2px solid #555;
                border-radius: 8px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                box-shadow: 0 4px 6px rgba(0,0,0,0.3);
                transition: all 0.3s ease;
            }

            /* A class we will toggle with JavaScript to change the button's look */
            .time-btn.day-mode {
                background-color: #ecf0b3;
                color: #000;
                border-color: #d4ac0d;
            }

            /* Class to hide the landing page */
            .blur-overlay.hidden {
                opacity: 0;
                pointer-events: none;
                backdrop-filter: blur(0px);
            }

            @keyframes pulse {
                0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
                70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); }
                100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
            }
            /* The Entry/Exit Door Button */
.custom-door {
    width: 30px;
    height: 30px;
    margin-left: -25px; /* Keeps it perfectly centered */
    margin-top: -25px;
    background: rgba(0, 0, 0, 0.6);
    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 12px;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    
    /* FIX: Only transition colors, NOT movement */
    transition: background-color 0.2s, color 0.2s, box-shadow 0.2s; 
}

/* The Door Symbol */
.custom-door::after {
    content: "🚪"; /* Standard Unicode Door */
    font-size: 26px;
}

/* The Hover Animation */
.custom-door:hover {
    background: rgba(255, 255, 255, 0.9);
    /* FIX: Replaced transform scaling with a bright glowing effect */
    box-shadow: 0 0 20px rgba(255,255,255,0.8); 
}
.custom-door {
    width: 30px;
    height: 30px;
    margin-left: -25px; /* Centers the 50px width */
    margin-top: -25px;  /* Centers the 50px height */
    /* ... keep all your other door CSS exactly the same ... */
}
/* The main button body */
.custom-arrow {
    width: 25px;
    height: 25px;
    margin-left: -22.5px; /* Keeps it perfectly centered */
    margin-top: -22.5px;
    background: rgba(0, 0, 0, 0.6);
    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    color: rgba(202, 245, 198, 0.637);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    
    /* FIX: Only transition colors, NOT movement or transforms */
    transition: background-color 0.2s, color 0.2s, box-shadow 0.2s; 
}

/* The Arrow Symbol */
.custom-arrow::after {
    content: "➔"; /* Unicode arrow character */
    font-size: 24px;
}

/* The Hover Animation */
.custom-arrow:hover {
    background: rgba(255, 255, 255, 0.9);
    color: black;
    /* FIX: Replaced transform scaling with a bright glowing effect */
    box-shadow: 0 0 20px rgba(255,255,255,0.8); 
}
.custom-arrow {
    width: 25px;
    height: 25px;
    margin-left: -22.5px; /* Pulls it left to center */
    margin-top: -22.5px;  /* Pulls it up to center */
    /* ... keep all your other arrow CSS exactly the same ... */
}

/* Directional Classes to point the arrow */
.point-up::after { transform: rotate(-90deg); } /* Points straight ahead */
.point-right::after { transform: rotate(0deg); }
.point-left::after { transform: rotate(180deg); }
.point-down::after { transform: rotate(90deg); }

    <body>

    <div class="hero">
        <div id="campus-map"></div>
        <button id="toggle-time" class="time-btn">🌙</button>

        <div id="hero-layer" class="blur-overlay">
        <img class="logo" src="logo.jpg">

            <div class="info-container">
                <h1 class="top-left-text">Know more <br>about campus..</h1>
                <div class="campus-details">
                    <p><span>Established:</span> 2005</p>
                    <p><span>Location:</span> Jabalpur, Madhya Pradesh</p>
                    <p><span>Campus:</span> PDPM IIITDM Jabalpur</p>
                    <p>Experience our campus in a 360° virtual environment.</p>
                </div>

            <button class="start-btn" onclick="startTour()">VIRTUAL TOUR</button>
        </div>

    <script>

            "basePath": "./main_gate_day_tiles",

            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 512,
            "maxLevel": 4,  
            "cubeResolution": 2768

                },

                        }
                    ]
            },
            "center_day": {

                "type": "multires",
                "multiRes" :{
            "basePath": "./center_day_tiles", 
            "path": "/%l/%s%y_%x",
            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 512,
            "maxLevel": 4,  
            "cubeResolution": 2768
        },
                "hotSpots": [
                    {
                        "pitch": -4.0,

            "center_night": {

            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 512,

            "cubeResolution": 2768
        },
                "hotSpots": [
                    {

                        "type":"scene",

                    }

                "multiRes" :{

            "path": "/%l/%s%y_%x",
            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 512,
            "maxLevel": 4,  
            "cubeResolution": 2768 
        },
                "hotSpots": [
                    {

                    },

                "type": "multires",
                "multiRes" :{
            "basePath": "./canteen_tiles", 
            "path": "/%l/%s%y_%x",
            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 512,

    // The Start Function (This replaces the alert)
        function startTour() {
            const overlay = document.getElementById('hero-layer');
            const nightBtn = document.getElementById('toggle-time');
            
            // Fade out the landing screen
            overlay.classList.add('hidden');
            // Show the night mode button
            nightBtn.style.display = 'block';
        }

    let isNight = false;
    const toggleBtn = document.getElementById('toggle-time');

    toggleBtn.addEventListener('click', () => {
        // grab current state and camera angle 
        const currentScene = viewer.getScene();
        const currentPitch = viewer.getPitch();
        const currentYaw   = viewer.getYaw();

        let nextScene;

        // determining the target scene and updating button UI
        if(isNight) {
            // switching to day 
            nextScene = currentScene.replace("_night", "_day");
            toggleBtn.innerHTML = "🌙";
            toggleBtn.classList.remove("day-mode");
            isNight = false;
        } else {
            // switch to night 
            nextScene = currentScene.replace("_day", "_night");
            toggleBtn.innerHTML = "☀️";
            toggleBtn.classList.add("day-mode");
            isNight = true;
        }

        // load the new passing the same pitches and yaw
        viewer.loadScene(nextScene, currentPitch, currentYaw);
    });
    </script>
