<!DOCTYPE HTML>
    <html>
    <head>
        <meta charset="utf-8">
        <title>College Campus Tour</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
        <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
        <style>
            body { margin: 0; padding: 0; }
            #campus-map { width: 100vw; height: 100vh; }
            .time-btn {
                position: absolute;
                top: 20px;
                right: 20px;
                z-index: 10; /* Forces the button to sit on top of the 360 viewer */
                padding: 10px 18px;
                background-color: #1a1a1a;
                color: #ffffff;
                border: 2px solid #555;
                border-radius: 8px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                box-shadow: 0 4px 6px rgba(0,0,0,0.3);
                transition: all 0.3s ease;
            }

            /* A class we will toggle with JavaScript to change the button's look */
            .time-btn.day-mode {
                background-color: #f1c40f;
                color: #000;
                border-color: #d4ac0d;
            }
            /* The Entry/Exit Door Button */
.custom-door {
    width: 30px;
    height: 30px;
    margin-left: -25px; /* Keeps it perfectly centered */
    margin-top: -25px;
    background: rgba(0, 0, 0, 0.6);
    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 12px;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    
    /* FIX: Only transition colors, NOT movement */
    transition: background-color 0.2s, color 0.2s, box-shadow 0.2s; 
}

/* The Door Symbol */
.custom-door::after {
    content: "🚪"; /* Standard Unicode Door */
    font-size: 26px;
}

/* The Hover Animation */
.custom-door:hover {
    background: rgba(255, 255, 255, 0.9);
    /* FIX: Replaced transform scaling with a bright glowing effect */
    box-shadow: 0 0 20px rgba(255,255,255,0.8); 
}
.custom-door {
    width: 30px;
    height: 30px;
    margin-left: -25px; /* Centers the 50px width */
    margin-top: -25px;  /* Centers the 50px height */
    /* ... keep all your other door CSS exactly the same ... */
}
/* The main button body */
.custom-arrow {
    width: 25px;
    height: 25px;
    margin-left: -22.5px; /* Keeps it perfectly centered */
    margin-top: -22.5px;
    background: rgba(0, 0, 0, 0.6);
    border: 2px solid rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    
    /* FIX: Only transition colors, NOT movement or transforms */
    transition: background-color 0.2s, color 0.2s, box-shadow 0.2s; 
}

/* The Arrow Symbol */
.custom-arrow::after {
    content: "➔"; /* Unicode arrow character */
    font-size: 24px;
}

/* The Hover Animation */
.custom-arrow:hover {
    background: rgba(255, 255, 255, 0.9);
    color: black;
    /* FIX: Replaced transform scaling with a bright glowing effect */
    box-shadow: 0 0 20px rgba(255,255,255,0.8); 
}
.custom-arrow {
    width: 25px;
    height: 25px;
    margin-left: -22.5px; /* Pulls it left to center */
    margin-top: -22.5px;  /* Pulls it up to center */
    /* ... keep all your other arrow CSS exactly the same ... */
}

/* Directional Classes to point the arrow */
.point-up::after { transform: rotate(-90deg); } /* Points straight ahead */
.point-right::after { transform: rotate(0deg); }
.point-left::after { transform: rotate(180deg); }
.point-down::after { transform: rotate(90deg); }
        </style>
    </head>
    <body>

    <div id="campus-map"></div>
    <button id="toggle-time" class="time-btn">🌙 Night Mode</button>

    <script>
    const viewer = pannellum.viewer('campus-map', {
        "default": {
            "firstScene": "main_gate_day", 
            "sceneFadeDuration": 1500, 
            "autoLoad": true , 
            "autoRotate" : -2,
            "autoRotateInactivityDelay": 3000,
            "hotSpotDebug": true,
            "touchPanSpeedCoeffFactor": 0.7, // Cuts the swipe speed in half
            "friction": 0.4
        },
        "scenes": {
            "main_gate_day": {
                "title": "Main Gate Day",
                "type": "multires",
                "multiRes" :{
            "basePath": "./main_gate_day_tiles", 
            "path": "/%l/%s%y_%x",
            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 512,
            "maxLevel": 4,  
            "cubeResolution": 2768 
        },
                "hotSpots": [
                    {
                        "pitch": -1.0, 
                        "yaw": 2.0, 
                        "type": "scene",
                        "text": "Go to tree",
                        "sceneId": "tree_day",
                        "cssClass": "custom-arrow point-up"
                    }
                ]
            },
            "main_gate_night": {
                "title": "Main Gate Night",
                "type": "multires",
                "multiRes": {
                    "basePath": "./main_gate_night_tiles", // <- to be changed to night
                    "path": "/%l/%s%y_%x",
                    "fallbackPath": "/fallback/%s",
                    "extension": "jpg",
                    "tileResolution": 512,
                    "maxLevel": 4,
                    "cubeResolution": 2768
                },
                    "hotSpots": [
                        {
                            "pitch": -1.0, 
                            "yaw": 2.0, 
                            "type": "scene",
                            "text": "Go to tree",
                            "sceneId": "tree_day",
                            "cssClass": "custom-arrow point-up"
                        }
                    ]
            },
            "center_day": {
                "title": "tree Day",
                "type": "multires",
                "multiRes" :{
            "basePath": "./center_day_tiles", 
            "path": "/%l/%s%y_%x",
            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 512,
            "maxLevel": 4,  
            "cubeResolution": 2768
        },
                "hotSpots": [
                    {
                        "pitch": -4.0,
                        "yaw": 175.,
                        "type":"scene",
                        "text":"back to cafeteria",
                        "sceneId": "cafeteria_day",
                        "cssClass": "custom-door"
                    }    
                ]
            },
            "center_night": {
                "title": "Center night",
                "type": "multires",
                "multiRes" :{
            "basePath": "./center_night_tiles", 
            "path": "/%l/%s%y_%x",
            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 512,
            "maxLevel": 4,  
            "cubeResolution": 2768
        },
                "hotSpots": [
                    {
                        "pitch": -3.1, // <- -3.1
                        "yaw": 95.9, // <- 95.9
                        "type":"scene",
                        "text":"back to cafeteria",
                        "sceneId": "cafeteria_night",
                        "cssClass": "custom-door"
                    }    
                ]
            },
            "cafeteria_day" : {
                "title" : "cafeteria_day",
                "type": "multires",
                "multiRes" :{
            "basePath": "./canteen_tiles", 
            "path": "/%l/%s%y_%x",
            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 512,
            "maxLevel": 4,  
            "cubeResolution": 2768 
        },
                "hotSpots": [
                    {
                        "pitch": -12.0,
                        "yaw": 179.5 ,
                        "type": "scene",
                        "text": "GO to center ",
                        "sceneId": "center_day",
                        "cssClass": "custom-arrow point-up"
                    },
                    {   
                        "pitch": -10.0,
                        "yaw": 156.0,
                        "type":"scene",
                        "text":"back to tree",
                        "sceneId": "tree_day",
                        "cssClass": "custom-arrow point-left"
                    }        
                ]
            },
            "cafeteria_night" : { // <- to be changed night
                "title" : "cafeteria_night",
                "type": "multires",
                "multiRes" :{
            "basePath": "./canteen_tiles", 
            "path": "/%l/%s%y_%x",
            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 512,
            "maxLevel": 4,  
            "cubeResolution": 2768 
        },
                "hotSpots": [
                    {
                        "pitch": -12.0,
                        "yaw": 179.5 ,
                        "type": "scene",
                        "text": "GO to center ",
                        "sceneId": "center_night",
                        "cssClass": "custom-arrow point-up"
                    },
                    {   
                        "pitch": -10.0,
                        "yaw": 156.0,
                        "type":"scene",
                        "text":"back to tree",
                        "sceneId": "tree_night",
                        "cssClass": "custom-arrow point-left"
                    }        
                ]
            },
            "tree_day" :{
                "title": 'tree_day',
                "type": 'multires',
                "multiRes" :{
            "basePath": "./tree_day_tiles", 
            "path": "/%l/%s%y_%x",
            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 512,
            "maxLevel": 4,  
            "cubeResolution": 2768 
        },
                "hotSpots":[
                    {
                        "pitch": 5.0,
                        "yaw": 20.0,
                        "type":"scene",
                        "text":"GO to cafeteria",
                        "sceneId": "cafeteria_day",
                        "cssClass": "custom-door",
                    },
                    {
                        "pitch": -7,      
                        "yaw": -92,
                        "type":"scene",
                        "text":"back to main gate",
                        "sceneId": "main_gate_day",
                        "cssClass": "custom-arrow point-up"
                    }
                ]


            },
            "tree_night" :{ // <- to be changed to night
                "title": 'tree_night',
                "type": 'multires',
                "multiRes" :{
            "basePath": "./tree_night_tiles", 
            "path": "/%l/%s%y_%x",
            "fallbackPath": "/fallback/%s",
            "extension": "jpg",
            "tileResolution": 512,
            "maxLevel": 4,  
            "cubeResolution": 2768 
        },
                "hotSpots":[
                    {
                        "pitch": 5.0,
                        "yaw": 20.0,
                        "type":"scene",
                        "text":"GO to cafeteria",
                        "sceneId": "cafeteria_night",
                        "cssClass": "custom-door"
                        
                    },
                    {
                        "pitch": -7,      
                        "yaw": -92,
                        "type":"scene",
                        "text":"back to main gate",
                        "sceneId": "main_gate_night",
                        "cssClass": "custom-arrow point-up"
                    }
                ]


            },
        }
    });

    let isNight = false;
    const toggleBtn = document.getElementById('toggle-time');

    toggleBtn.addEventListener('click', () => {
        // grab current state and camera angle 
        const currentScene = viewer.getScene();
        const currentPitch = viewer.getPitch();
        const currentYaw   = viewer.getYaw();

        let nextScene;

        // determining the target scene and updating button UI
        if(isNight) {
            // switching to day 
            nextScene = currentScene.replace("_night", "_day");
            toggleBtn.innerHTML = "🌙 Night Mode";
            toggleBtn.classList.remove("day-mode");
            isNight = false;
        } else {
            // switch to night 
            nextScene = currentScene.replace("_day", "_night");
            toggleBtn.innerHTML = "☀️ Day Mode";
            toggleBtn.classList.add("day-mode");
            isNight = true;
        }

        // load the new passing the same pitches and yaw
        viewer.loadScene(nextScene, currentPitch, currentYaw);
    });
    </script>

    </body>
    </html>
